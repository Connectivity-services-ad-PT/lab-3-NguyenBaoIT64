name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start all Prism mock servers (with health checks)
        run: node scripts/start-all-mocks.js > /tmp/mocks.log 2>&1 &
        timeout-minutes: 2

      - name: Wait for mock servers to be ready
        run: sleep 10

      - name: Run Newman tests - IoT Ingestion (mock, optional)
        run: npm run test:mock
        continue-on-error: true

      - name: Run Newman tests - B3 Access Gate (mock, required)
        run: npm run test:b3:mock

      - name: Upload HTML test reports
        if: always()
        run: |
          npm run test:b3:html || true

      - name: Show mock server logs if tests failed
        if: failure()
        run: |
          echo "=== Mock server logs ===" && cat /tmp/mocks.log 2>/dev/null || echo "Mock logs not found"
          echo "=== Running processes ===" && ps aux | grep -E 'prism|mock' || true
          echo "=== Network check ===" && netstat -tlnp 2>/dev/null | grep -E '4010|4011|4020' || echo "No listening ports found"

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
